name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build libglfw3-dev clang-tidy

      - name: Configure
        run: cmake -B build -G Ninja

      - name: Build
        run: cmake --build build