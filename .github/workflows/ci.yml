name: CI - Windows & Linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        compiler: [gcc, clang]
        include:
          - os: windows-latest
            compiler: msvc

    steps:
      - uses: actions/checkout@v3        # Checkout repo

      - name: Cache CMake
        uses: actions/cache@v3
        with:
          path: ~/.cache
          key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Setup CMake
        uses: lukka/get-cmake@v3
        with:
          cmake-version: '3.27.0'

      - name: Setup Compiler (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          if [ "${{ matrix.compiler }}" == "gcc" ]; then sudo apt-get install -y build-essential; fi
          if [ "${{ matrix.compiler }}" == "clang" ]; then sudo apt-get install -y clang; fi

      - name: Build Editor
        run: |
          cmake -S . -B build/editor -DAXIOM_TARGET=Editor -DCMAKE_BUILD_TYPE=Release -DAXIOM_ENABLE_ASSERTS=ON -DAXIOM_ENABLE_LOGGING=ON -DAXIOM_ENABLE_LTO=ON
          cmake --build build/editor --config Release --target Editor

      - name: Build Engine
        run: |
          cmake -S . -B build/engine -DAXIOM_TARGET=AxiomEngine -DCMAKE_BUILD_TYPE=Release -DAXIOM_ENABLE_ASSERTS=ON -DAXIOM_ENABLE_LOGGING=ON -DAXIOM_ENABLE_LTO=ON
          cmake --build build/engine --config Release --target AxiomEngine

      - name: Build Sandbox
        run: |
          cmake -S . -B build/sandbox -DAXIOM_TARGET=Sandbox -DCMAKE_BUILD_TYPE=Release -DAXIOM_ENABLE_ASSERTS=ON -DAXIOM_ENABLE_LOGGING=ON -DAXIOM_ENABLE_LTO=ON
          cmake --build build/sandbox --config Release --target Sandbox

      - name: Upload Editor
        uses: actions/upload-artifact@v3
        with:
          name: Editor
          path: build/editor/

      - name: Upload Engine
        uses: actions/upload-artifact@v3
        with:
          name: Engine
          path: build/engine/

      - name: Upload Sandbox
        uses: actions/upload-artifact@v3
        with:
          name: Sandbox
          path: build/sandbox/